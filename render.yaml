services:
  - type: web
    name: strava-dashboard
    runtime: node
    plan: free
    buildCommand: cd dashboard && npm install && npm run build
    startCommand: node api-server.js
    healthCheckPath: /api/refresh-data
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: FRIEND_CLIENT_ID
        sync: false
      - key: FRIEND_CLIENT_SECRET
        sync: false
      - key: FRIEND_ACCESS_TOKEN
        sync: false
      - key: FRIEND_REFRESH_TOKEN
        sync: false
      - key: FRIEND_EXPIRES_AT
        sync: false
      - key: FRIEND_FIRSTNAME
        sync: false
      - key: FRIEND_LASTNAME
        sync: false
      - key: FRIEND_PHOTO
        sync: false
